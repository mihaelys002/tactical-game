name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (with analyzers)
        run: dotnet build --no-restore -c Debug

      - name: Build tests
        run: dotnet build --no-restore -c Debug tests/BattleTest/BattleTest.csproj
